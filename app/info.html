<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>5D — Info</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Ctext y='14' font-size='14'%3E📐%3C/text%3E%3C/svg%3E" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --teal: #0f766e;
      --teal-dark: #115e59;
      --teal-soft: rgba(15,118,110,.1);
      --bg: #f0f6ff;
      --surface: #ffffff;
      --border: rgba(30,60,120,.1);
      --text: #0f1c2e;
      --text-2: #4a5a72;
      --text-3: #8898aa;
      --shadow: 0 20px 60px rgba(15,40,90,.1);
    }

    body {
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background-image:
        radial-gradient(circle at 20% 20%, rgba(15,118,110,.08) 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(29,111,232,.08) 0%, transparent 50%);
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 48px 52px;
      max-width: 480px;
      width: 100%;
      box-shadow: var(--shadow);
      text-align: center;
    }

    .logo {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
      text-decoration: none;
      margin-bottom: 32px;
    }
    .logo-icon { font-size: 28px; }

    h1 {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -.02em;
      margin-bottom: 10px;
    }

    .subtitle {
      font-size: 15px;
      color: var(--text-2);
      line-height: 1.6;
      margin-bottom: 40px;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin-bottom: 36px;
    }

    .link-card {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 18px 22px;
      border: 1.5px solid var(--border);
      border-radius: 16px;
      text-decoration: none;
      color: var(--text);
      transition: border-color .2s, box-shadow .2s, transform .15s;
      text-align: left;
    }
    .link-card:hover {
      border-color: var(--teal);
      box-shadow: 0 4px 20px rgba(15,118,110,.12);
      transform: translateY(-2px);
    }

    .link-icon {
      width: 48px; height: 48px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 22px;
    }
    .link-icon-gh  { background: #f0f0f0; }
    .link-icon-yt  { background: #fff0f0; }

    .link-text-title {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 2px;
    }
    .link-text-sub {
      font-size: 13px;
      color: var(--text-3);
    }

    .link-arrow {
      margin-left: auto;
      color: var(--text-3);
      flex-shrink: 0;
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: var(--text-3);
      text-decoration: none;
      padding: 8px 16px;
      border-radius: 100px;
      border: 1px solid var(--border);
      transition: color .2s, border-color .2s;
      cursor: pointer;
      background: none;
    }
    .back-btn:hover { color: var(--teal); border-color: var(--teal); }

    @media (max-width: 520px) {
      .card { padding: 32px 24px; }
    }
  </style>
</head>
<body>
  <div class="card">
    <a href="./" class="logo">
      <span class="logo-icon">📐</span>
       <strong>5D</strong>
    </a>

    <h1>Project Info</h1>
    <p class="subtitle">Source code, demos and documentation for the 4D/5D Construction Viewer.</p>

    <div class="links">
      <a class="link-card" href="https://github.com/dronov-dmitry/5D" target="_blank" rel="noreferrer">
        <div class="link-icon link-icon-gh">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
            <path d="M12 2C6.48 2 2 6.48 2 12c0 4.42 2.87 8.17 6.84 9.49.5.09.68-.22.68-.48v-1.7c-2.78.6-3.37-1.34-3.37-1.34-.45-1.15-1.11-1.46-1.11-1.46-.91-.62.07-.61.07-.61.1.01.19.03.28.06.53.17.97.56 1.22 1.07.44.77 1.38 1.03 2.15.6.09-.48.35-.81.63-1C8.3 17.1 6.1 16.3 6.1 12.6c0-1.08.39-1.97 1.02-2.67-.1-.25-.44-1.27.1-2.64 0 0 .83-.27 2.73 1.02A9.4 9.4 0 0112 8.1c.84 0 1.69.11 2.48.34 1.9-1.29 2.73-1.02 2.73-1.02.54 1.37.2 2.39.1 2.64.63.7 1.02 1.59 1.02 2.67 0 3.71-2.2 4.5-4.3 4.74.34.29.64.88.64 1.77v2.62c0 .26.18.57.69.47A10.01 10.01 0 0022 12c0-5.52-4.48-10-10-10z" fill="currentColor"/>
          </svg>
        </div>
        <div>
          <div class="link-text-title">GitHub Repository</div>
          <div class="link-text-sub">github.com/dronov-dmitry/5D</div>
        </div>
        <svg class="link-arrow" width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </a>

      <a class="link-card" href="https://youtu.be/pL_BOoI8qFA" target="_blank" rel="noreferrer">
        <div class="link-icon link-icon-yt">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
            <path d="M21.8 8s-.2-1.4-.8-2c-.8-.8-1.6-.8-2-.9C16.6 5 12 5 12 5s-4.6 0-7 .1c-.4.1-1.2.1-2 .9-.6.6-.8 2-.8 2S2 9.6 2 11.2v1.5c0 1.6.2 3.2.2 3.2s.2 1.4.8 2c.8.8 1.8.8 2.3.9C6.8 19 12 19 12 19s4.6 0 7-.1c.4-.1 1.2-.1 2-.9.6-.6.8-2 .8-2s.2-1.6.2-3.2v-1.5C22 9.6 21.8 8 21.8 8zM10 14.5v-5l5.5 2.5L10 14.5z" fill="#FF0000"/>
          </svg>
        </div>
        <div>
          <div class="link-text-title">YouTube Demo</div>
          <div class="link-text-sub">youtu.be/pL_BOoI8qFA</div>
        </div>
        <svg class="link-arrow" width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </a>
    </div>

    <button class="back-btn" onclick="history.back()">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <path d="M9 2L4 7l5 5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Back to app
    </button>
  </div>
</body>
</html>
